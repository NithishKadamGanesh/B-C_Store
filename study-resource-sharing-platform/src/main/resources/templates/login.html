<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login - StudyShare')}"></head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="brand-icon-lg">&#128218;</span>
                <h1>Welcome Back</h1>
                <p>Sign in to access your study resources</p>
            </div>

            <div th:if="${param.error}" class="alert alert-error">
                Invalid username or password. Please try again.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                You have been logged out successfully.
            </div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/login}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a th:href="@{/register}">Create one</a></p>
            </div>
        </div>
    </div>

</body>
</html>
