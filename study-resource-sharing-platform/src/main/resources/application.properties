spring.application.name=study-resource-sharing-platform

# ── Server ──────────────────────────────────────────────
server.port=8080

# ── Database (MySQL) ────────────────────────────────────
# Override via environment variables in production:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/study_resources?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ── AWS S3 ──────────────────────────────────────────────
# IMPORTANT: Set these as environment variables, never commit real keys!
#   AWS_ACCESS_KEY_ID, AWS_SECRET_KEY, AWS_S3_BUCKET_NAME, AWS_S3_REGION
aws.s3.bucketName=${AWS_S3_BUCKET_NAME:your-bucket-name}
aws.s3.region=${AWS_S3_REGION:us-east-2}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:your-access-key}
aws.secretKey=${AWS_SECRET_KEY:your-secret-key}

# ── Thymeleaf ───────────────────────────────────────────
spring.thymeleaf.cache=false

# ── File Upload Limits ──────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── Error Handling ──────────────────────────────────────
server.error.whitelabel.enabled=false
server.error.path=/error

# ── Logging ─────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.studyshare.platform=DEBUG
logging.level.org.springframework.security=INFO
